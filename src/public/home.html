<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Command Center for the Wheel Strategy Screener cash-secured put and covered-call dashboard."
    />
    <title>Home - Wheel Strategy Screener</title>
    <link rel="icon" href="/favicon.ico?v=0.2.8" sizes="any" />
    <link rel="icon" href="/favicon-32.png?v=0.2.8" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16.png?v=0.2.8" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=0.2.8" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="home-body">
    <main class="app-shell home-shell">
      <section class="command-center" aria-labelledby="homeTitle">
        <div class="command-brand">
          <img src="/apple-touch-icon.png?v=0.2.8" alt="" class="command-logo" />
          <h1 id="homeTitle" class="command-title">Wheel Strategy Screener</h1>
        </div>

        <div class="command-actions" aria-label="Dashboard actions">
          <a class="command-card" href="/dashboard.html?strategy=csp" data-home-strategy="csp">
            CSP Dashboard
          </a>
          <a class="command-card" href="/dashboard.html?strategy=cc" data-home-strategy="cc">
            CC Dashboard
          </a>
        </div>
      </section>
    </main>

    <script>
      const LAST_STRATEGY_KEY = "wheel-screener-last-strategy-v1";

      for (const link of document.querySelectorAll("[data-home-strategy]")) {
        link.addEventListener("click", () => {
          try {
            window.localStorage.setItem(LAST_STRATEGY_KEY, link.dataset.homeStrategy);
          } catch {
            // Navigation still works without localStorage.
          }
        });
      }
    </script>
  </body>
</html>
